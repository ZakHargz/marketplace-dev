name: Publish Marketplace

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: publish-marketplace
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.pages-artifact.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install APM
        run: python -m pip install apm-cli

      - name: Validate and build marketplace
        run: |
          apm marketplace check
          # Regenerate first so removed packages disappear from both the
          # marketplace artifact and the Pages catalogue.
          apm pack
          apm pack --check-versions --check-clean --dry-run
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct -- .claude-plugin/marketplace.json)"
          python scripts/generate-catalog.py

      - name: Upload marketplace release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha256sum .claude-plugin/marketplace.json > .claude-plugin/marketplace.json.sha256
          gh release create "${GITHUB_REF_NAME}" \
            .claude-plugin/marketplace.json \
            .claude-plugin/marketplace.json.sha256 \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Upload Pages artifact
        id: pages-artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
