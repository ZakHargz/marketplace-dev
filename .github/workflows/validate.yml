name: Validate Marketplace

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apm.yml"
      - "packages/**"
      - "scripts/**"
      - "site/**"
      - ".claude-plugin/marketplace.json"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install APM
        run: python -m pip install apm-cli

      - name: Validate package and marketplace manifests
        run: |
          python scripts/sync-marketplace.py
          python scripts/prune-marketplace.py
          apm marketplace check --offline

      - name: Build temporary marketplace output
        run: |
          apm pack
          apm pack --check-versions --check-clean --dry-run

      - name: Build temporary catalogue
        run: |
          python scripts/generate-catalog.py

      - name: Audit package content and lockfile drift
        run: apm audit --ci --no-policy
