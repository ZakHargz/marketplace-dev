name: apex-agent-marketplace
version: 0.1.0
description: APEX-approved and team-owned agent packages
author: APEX
repository: https://github.com/Flutter-Global/marketplace-dev
license: MIT
marketplace:
  owner:
    name: zakhargz
    url: https://github.com/zakhargz

  # Default tag pattern used to resolve version ranges for each package.
  build:
    tagPattern: "v{version}"

  # Output targets (map form). 'claude' is enabled by default;
  # uncomment 'codex' below to publish the Codex artifact too.
  # Each output writes to its profile default path; add 'path:'
  # under a key to override.
  outputs:
    claude: {}
    # codex: {}
    #
    # Note: enabling codex requires every package below to declare
    # 'category:' (e.g. category: Productivity).

  # CI tip: build one or all formats with a machine-readable manifest:
  #   apm pack --marketplace=claude,codex --json | jq -r '.marketplace.outputs[].path'

  packages:
    - name: pr-validation-test
      description: Test skill used to verify marketplace pull request validation.
      source: ./packages/teams/apex/pr-validation-test
      version: "^0.1.0"
      tags:
        - apex

    - name: review-pr-lite
      description: Use when the user wants to apply GitHub PR review comments from Copilot — implements valid recommendations and replies to every comment.
      source: ./packages/teams/apex/review-pr-lite
      version: "^0.1.0"
      tags:
        - apex

    - name: confluence
      description: APEX-approved generic Confluence integration
      source: ./packages/generic/confluence
      version: "^1.0.0"
      tags:
        - generic
      # Required when outputs includes codex:
      # category: Productivity
      # Optional overrides:
      # subdir: path/inside/repo
      # Per-package version tag (recommended for monorepos so each
      # package can be released independently). Leave commented for
      # repo-wide lockstep tagging.
      # tag_pattern: "{name}-v{version}"
      # include_prerelease: false
      # ref: main  # pin to an explicit ref instead of a version range

    # Local-path entry: ship a package shipped alongside this repo.
    # - name: local-tool
    #   source: ./packages/local-tool
    #   description: A locally vendored tool
    #   version: 0.1.0
    #   # tag_pattern: "{name}-v{version}"
