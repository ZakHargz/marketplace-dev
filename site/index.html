<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apex Marketplace - Flutter-Global</title>
  <meta name="description" content="Catalog of reusable AI agents, skills, and instructions for Flutter-Global teams.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header"><div class="wrap">
    <div class="brand">Flutter-Global</div><h1>Apex Marketplace</h1>
    <p class="lead">Reusable AI agents, skills, and instructions for teams across Flutter-Global. Install with one command.</p>
    <div class="stats"><div><b id="stat-packages">0</b><span>Packages</span></div><div><b id="stat-agents">0</b><span>Agents</span></div><div><b id="stat-skills">0</b><span>Skills</span></div><div><b id="stat-instructions">0</b><span>Instructions</span></div><div><b id="stat-teams">0</b><span>Teams</span></div></div>
  </div></header>
  <main><div class="filters"><input id="search" type="search" placeholder="Search packages..." aria-label="Search packages"><select id="filter-category" aria-label="Filter by category"><option value="">All categories</option><option value="agents">Agents</option><option value="skills">Skills</option><option value="instructions">Instructions</option><option value="prompts">Prompts</option></select><select id="filter-team" aria-label="Filter by team"><option value="">All teams</option></select><span class="result-count" id="result-count"></span></div><div class="grid" id="grid"></div><div class="empty" id="empty">No packages match your filters.</div></main>
  <footer><p>Last updated <time id="last-updated">-</time> · <a href="https://github.com/Flutter-Global/apex-marketplace">Source on GitHub</a> · <a href="catalog.json">Raw catalog (JSON)</a></p></footer>
  <script src="app.js"></script>
</body>
</html>
